<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f12" />
<meta name="description" content="Oracle of the Quiet Fracture — draw one card, read one fragment." />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<title>Oracle of the Quiet Fracture</title>
<style>
  @font-face {
    font-family: "Fragment Serif";
    src: url("./fonts/fragment-serif.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --field: #0e0f12;
    --fragment-ink: #e7e4dd;
    --label-ink: #6f7a83;
    --serif: "Fragment Serif", Georgia, "Times New Roman", serif;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    background: var(--field);
    color: var(--fragment-ink);
    font-family: var(--serif);
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 2.4vh, 26px);
    padding: max(64px, calc(env(safe-area-inset-top) + 46px)) 20px max(20px, env(safe-area-inset-bottom));
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    perspective: 1600px;
    perspective-origin: 50% 42%;
  }

  /* Masthead — floats at the top with a faint glow behind it. */
  .title {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    left: 0;
    right: 0;
    margin: 0;
    text-align: center;
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(16px, 4.6vw, 22px);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #d7d2c7;
    text-shadow: 0 0 22px rgba(231, 228, 221, 0.28);
    pointer-events: none;
    animation: titleFloat 7s ease-in-out infinite;
  }
  .title .nine {
    color: #c8842f;
    text-shadow:
      0 0 10px rgba(200, 132, 47, 0.85),
      0 0 26px rgba(200, 132, 47, 0.5);
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  /* The card — one print on a wall. 2:3 portrait. Also the 3D flip scene. */
  .card {
    position: relative;
    width: min(76vw, 40svh, 420px);
    aspect-ratio: 2 / 3;
    border-radius: 5px;
    perspective: 1500px;
    background: transparent; /* clear the UA <button> fill so black shows through mid-flip */
    --glow: rgba(120, 124, 132, 0.3);    /* per-card, from the image */
    --glow-back: rgba(150, 45, 48, 0.4); /* the card back's own ember */
    animation: float 9s ease-in-out infinite;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    appearance: none;
    border: none;
    padding: 0;
    color: inherit;
    display: block;
  }
  .card:focus-visible {
    outline: 1px solid rgba(231, 228, 221, 0.45);
    outline-offset: 4px;
  }

  /* The two-sided inner that rotates; faces sit back-to-back. */
  .card__inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
  }
  .is-flipping .card__inner {
    animation: flip 1.15s cubic-bezier(0.45, 0.05, 0.25, 1) both;
  }
  /* On open the card rests face-down, then turns up to reveal. */
  .is-back .card__inner { transform: rotateY(180deg); }
  .is-intro .card__inner {
    animation: flip-in 0.95s cubic-bezier(0.45, 0.05, 0.25, 1) both;
  }

  .card__face {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .card__face--front {
    background: #131619; /* replaced per-family at runtime */
    box-shadow: 0 0 12px 1px var(--glow), 0 0 64px 8px var(--glow), 0 0 150px 30px var(--glow);
    transition: box-shadow 0.9s ease;
  }
  .card__face--back {
    transform: rotateY(180deg);
    background: #0b0a0c;
    box-shadow: 0 0 12px 1px var(--glow-back), 0 0 64px 8px var(--glow-back), 0 0 150px 30px var(--glow-back);
  }
  .card__back {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card__art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Scrim so app-rendered text stays legible over the lower band. */
  .card__scrim {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 56%,
      rgba(0, 0, 0, 0.35) 74%,
      rgba(0, 0, 0, 0.74) 100%
    );
  }

  /* The reserved band — lower 30% of the card. */
  .card__text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 32%;
    padding: 0 8.5% 7%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    text-align: left;
  }

  .card__label {
    font-family: var(--sans);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--label-ink);
    margin: 0 0 0.7em;
    font-weight: 500;
  }

  .card__fragment {
    font-family: var(--serif);
    color: var(--fragment-ink);
    font-size: clamp(15px, 3.6vw, 18px);
    line-height: 1.5;
    margin: 0;
    text-wrap: pretty;
    text-shadow: 0 1px 10px rgba(0, 0, 0, 0.55);
  }

  /* The art reveal is the flip itself; the fragment text phases in after it lands. */
  .card__text { opacity: 0; transform: translateY(6px); }

  .is-settled .card__text { opacity: 1; transform: none; }
  .is-reading .card__text { animation: text-in 1.3s ease-out forwards; }

  @keyframes text-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* The card drifts as if hung in the dark — a slow lift with a faint tilt. */
  @keyframes float {
    0%   { transform: translateY(0) rotateX(0deg) rotateZ(0deg); }
    50%  { transform: translateY(-13px) rotateX(1.4deg) rotateZ(-0.25deg); }
    100% { transform: translateY(0) rotateX(0deg) rotateZ(0deg); }
  }

  /* The flip — each draw turns the card fully over, past its back, to the new face. */
  @keyframes flip {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  /* The opening reveal — a half turn from the back to the face. */
  @keyframes flip-in {
    0%   { transform: rotateY(180deg); }
    100% { transform: rotateY(360deg); }
  }

  /* A quiet description of the image, beneath the card. */
  .desc {
    max-width: min(82vw, 460px);
    min-height: 3.6em; /* reserve space so the layout doesn't jump between cards */
    margin: 0;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(12px, 3vw, 13.5px);
    line-height: 1.5;
    color: rgba(231, 228, 221, 0.46);
    text-wrap: pretty;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }
  .card.is-reading ~ .desc,
  .card.is-settled ~ .desc { opacity: 1; }

  /* The single, quiet Draw affordance. */
  .draw {
    appearance: none;
    background: none;
    border: 1px solid rgba(231, 228, 221, 0.16);
    border-radius: 999px;
    color: rgba(231, 228, 221, 0.62);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 11px 26px;
    cursor: pointer;
    transition: color 0.4s ease, border-color 0.4s ease;
  }
  .draw:hover { color: rgba(231, 228, 221, 0.9); border-color: rgba(231, 228, 221, 0.32); }
  .draw:focus-visible {
    outline: 1px solid rgba(231, 228, 221, 0.45);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .title { animation: none; }
    .card { animation: none; transform: none; }       /* glow stays, drift stops */
    .is-flipping .card__inner,
    .is-intro .card__inner { animation: none; }       /* no flip */
    .is-back .card__inner { transform: none; }        /* never stuck face-down */
    .is-reading .card__text { animation: none; }
    .card__text { opacity: 1; transform: none; }      /* text always shown */
  }
</style>
</head>
<body>
  <h1 class="title">Signal<span class="nine">9</span> Oracle</h1>

  <button class="card" id="card" type="button" aria-label="Draw a card">
    <div class="card__inner" id="inner">
      <div class="card__face card__face--front" id="front">
        <img class="card__art" id="art" alt="" aria-hidden="true" decoding="async" />
        <div class="card__scrim" aria-hidden="true"></div>
        <div class="card__text">
          <p class="card__label" id="label"></p>
          <p class="card__fragment" id="fragment"></p>
        </div>
      </div>
      <div class="card__face card__face--back" aria-hidden="true">
        <img class="card__back" id="back" alt="" decoding="async" src="./images/back.webp" />
      </div>
    </div>
  </button>

  <p class="desc" id="desc" aria-live="polite"></p>

  <button class="draw" id="draw" type="button">Draw</button>

<script>
  const FAMILIES = {
    contained: { label: "Contained", base: "#131619" },
    torn:      { label: "Torn",      base: "#15151a" },
    mourning:  { label: "Mourning",  base: "#16151b" },
    withered:  { label: "Withered",  base: "#17161a" },
    fractured: { label: "Fractured", base: "#14130f" }
  };

  const CARDS = [
    // CONTAINED
    { family:"contained", img:"./images/contained-anchor.webp",
      texts:[
        "You became the shape of what holds you, and forgot there was anything inside to keep.",
        "What contains you has been doing your remembering. Step out and see what is actually still there.",
        "You learned the walls so well you call them yourself now."
      ],
      desc:"A woman in profile, her face and shoulder breaking into shards of black stone and red rose. The container and the held are no longer separate — the structure has grown into the skin." },
    { family:"contained", img:"./images/contained-01.webp",
      texts:[
        "You have grown to fit the room. Be careful what you call comfort.",
        "Bound long enough, you stop feeling the binding and start calling it posture.",
        "The wrapping kept you safe and kept you still. Only one of those was the point."
      ],
      desc:"A blindfolded figure wound in pale linen, frost-stiff wings behind her. Held, protected, unable to move — every comfort here is also a restraint." },
    { family:"contained", img:"./images/contained-02.webp",
      texts:[
        "Nothing has broken. That is not the same as nothing being under strain.",
        "The calm surface is real. So is the pressure it is holding flat.",
        "Look how composed you are. Now ask what the composure is for."
      ],
      desc:"A cool-toned face, serene on one side, dissolving into pale fractured tiles on the other. Nothing has shattered yet — but the seam is already there, just under the stillness." },
    { family:"contained", img:"./images/contained-03.webp",
      texts:[
        "The walls are not the problem. You keep reinforcing them from the inside.",
        "Every brick you set was meant to keep something out. Count how many face inward.",
        "You built it for protection and stayed to maintain it."
      ],
      desc:"A face assembled from a grid of copper and charcoal tiles. Each square is neat, deliberate, load-bearing — a structure built and kept from within." },
    { family:"contained", img:"./images/contained-04.webp",
      texts:[
        "You have held it so long it feels like a wall now, and not a thing you are holding back.",
        "The effort went rigid. Now you mistake the strain for your own shape.",
        "Set it down for one breath and feel how much of you was just holding."
      ],
      desc:"Half a woman's face calm and whole; the other half hardened into a wall of cracked masonry. What she holds back has set, brick by brick, into a structure." },
    { family:"contained", img:"./images/contained-05.webp",
      texts:[
        "You made yourself easy to carry. Notice who set you down anyway.",
        "You folded smaller and smaller to be kept. You were still left somewhere.",
        "Being easy to hold did not make you held."
      ],
      desc:"A face tiled into a black-and-white checkerboard, paint weeping down the seams. Made flat, made portable, made convenient — and still coming apart at the joins." },
    { family:"contained", img:"./images/contained-06.webp",
      texts:[
        "Whatever you have sealed will keep. The question is what the keeping costs.",
        "Preserved is not the same as alive. Check which one you chose.",
        "You stored it so carefully you forgot you wanted it back."
      ],
      desc:"A face set among a grid of rusted squares and faded photographs, sealed behind tile and time. Everything is kept here — and everything is paying the rent of being kept." },
    { family:"contained", img:"./images/contained-07.webp",
      texts:[
        "You call it patience. It has not moved in a long time.",
        "Waiting and stalling wear the same face. You know which one this is.",
        "Stillness chosen is patience. Stillness from fear is just waiting to be told it is allowed."
      ],
      desc:"A face going to cracked clay, studded with small tiles, a faint orange dust drifting off. Composed and unmoving — drying in place while it waits." },
    { family:"contained", img:"./images/contained-08.webp",
      texts:[
        "What you hold in does not vanish. It finds the seams.",
        "Pressure does not disappear because you sealed it. It looks for the weakest joint.",
        "Everything you swallowed is still in there, learning the cracks."
      ],
      desc:"A face built of rusted, riveted plates, red bleeding between them. Whatever is pressed inside has found the gaps and begun to show through the seams." },
    { family:"contained", img:"./images/contained-09.webp",
      texts:[
        "The space you let yourself take has a number. You did not choose it. You learned it.",
        "Someone drew your edges early and you have been colouring inside them since.",
        "Measure how small you went. Then ask who taught you the measurement."
      ],
      desc:"A face emerging from a wall of mismatched, weathered tiles, fitted exactly to its frame. The boundary was set by the wall, not the face — and the face has learned to fit." },
    { family:"contained", img:"./images/contained-10.webp",
      texts:[
        "You have spilled nothing. You have also poured nothing. Decide which you meant.",
        "Sealed tight keeps the mess in and the life out. Both. Always both.",
        "Nothing leaked. Nothing reached anyone either."
      ],
      desc:"A face scattering into a mosaic of bright and dark squares, holding its shape against the spill. Contained completely — nothing lost, nothing given." },

    // TORN
    { family:"torn", img:"./images/torn-anchor.webp",
      texts:[
        "The tearing was not the betrayal. You felt the seam give for years and called it holding.",
        "You knew the thread was going. You just preferred the word “fine.”",
        "It did not betray you when it tore. It told the truth you had been mouthing over for years."
      ],
      desc:"A woman in profile as the wall around her peels away in chips of black and red. The surface is coming off in pieces — and it was loose long before today." },
    { family:"torn", img:"./images/torn-01.webp",
      texts:[
        "The tear was never the failure. The pretending it would hold was.",
        "Two colours forced into one face, and the line between them finally lit up.",
        "The failure was the years you spent calling the strain okay."
      ],
      desc:"A face split in hard red and blue light, raw seams of red cutting across it. Two pressures meeting at a line that has stopped pretending to be whole." },
    { family:"torn", img:"./images/torn-02.webp",
      texts:[
        "Something gave way. You are not sure yet whether it freed you or just opened you.",
        "The split let the light in and the weather too. You will know which mattered later.",
        "It came apart. Whether that is a wound or a door is still being decided."
      ],
      desc:"Several exposures of a face bleeding together in saturated colour, torn down the centre by a pale seam. Something has opened — release and exposure at once." },
    { family:"torn", img:"./images/torn-03.webp",
      texts:[
        "You were not split down the middle. You were split where you were already thin.",
        "It did not tear at random. It tore where you had worn yourself down to nothing.",
        "The break found the place you had been quietly thinning for years."
      ],
      desc:"A blindfolded figure in profile, dark tattered wings against a weathered wall. Worn thin in places and bound in others — torn exactly where she was already giving way." },
    { family:"torn", img:"./images/torn-04.webp",
      texts:[
        "The seam tells the truth the surface kept. Read it.",
        "Where it came apart is where it was honest. Look there, not at the polish.",
        "The clean half was the lie. The torn half is the testimony."
      ],
      desc:"Half a face rendered soft and whole, the other half collapsing into collaged tiles under a red sun. The seam between them is where the truth finally shows." },
    { family:"torn", img:"./images/torn-05.webp",
      texts:[
        "It did not come apart all at once. You only noticed all at once.",
        "The cracks were patient. Your attention was the thing that arrived late.",
        "It had been leaving for a long time. You just looked up at the end."
      ],
      desc:"A face fracturing into a field of rusted, broken tiles. It looks sudden, but every crack here is old — only the seeing is new." },
    { family:"torn", img:"./images/torn-06.webp",
      texts:[
        "You keep the two pieces in the same hand. That is not the same as whole.",
        "Holding both halves is not healing. It is just refusing to drop either.",
        "Whole and held-together are different. You have been doing the second one."
      ],
      desc:"One half of a face intact and luminous; the other ripped away into rusted squares and old snapshots. Both pieces here, side by side — together but not rejoined." },
    { family:"torn", img:"./images/torn-07.webp",
      texts:[
        "What tore was load-bearing. That is why it tore, and why you miss it.",
        "It carried weight. That is exactly why losing it costs this much.",
        "You only tear at the places that were holding something up."
      ],
      desc:"A serene profile with the skin peeling back to bronze leaves and blossoms beneath. What came away was not decoration — it was holding the rest in place." },
    { family:"torn", img:"./images/torn-08.webp",
      texts:[
        "You can be opened without being broken. You can also call breaking \"opened.\" Be honest about which.",
        "Some things open you. Some things just break and ask to be called opening.",
        "Name it correctly. The word you choose decides what you tend."
      ],
      desc:"A face washed in deep red, the cheek cracking and flaking into the dark. Opened or broken — the image refuses to flatter you with the answer." },
    { family:"torn", img:"./images/torn-09.webp",
      texts:[
        "The pull was always there. The fabric simply stopped agreeing to it.",
        "The strain did not arrive. It was simply, finally, obeyed.",
        "Nothing new pulled. The thread just stopped pretending it could hold."
      ],
      desc:"A face splintering into pale shards of glass, fragments drifting loose at the edges. The tension was constant; the surface only just stopped resisting it." },
    { family:"torn", img:"./images/torn-10.webp",
      texts:[
        "Mending is not returning. Whatever you stitch will show the line forever.",
        "You can close it. You cannot make it never have happened.",
        "The repair will hold. It will also always be visible. Both are true."
      ],
      desc:"A face half-whole, half-split along glowing red fractures, shards of ice falling away. It can be put back — but the line will always read as a line." },

    // MOURNING
    { family:"mourning", img:"./images/mourning-anchor.webp",
      texts:[
        "You are not carrying it. You are what remained standing after it was set down.",
        "The weight is gone. What is left is the shape it pressed into you.",
        "You did not survive it by holding on. You survived by being what it left behind."
      ],
      desc:"A woman with closed eyes, half her face overtaken by dark blossoms and red. Still standing, changed in the standing — the grief has become part of the architecture." },
    { family:"mourning", img:"./images/mourning-01.webp",
      texts:[
        "You are not carrying it. You are what's left after it was set down.",
        "You set it down a while ago, and still you are built around where it sat.",
        "The carrying ended. The shape of having carried it did not."
      ],
      desc:"A woman in profile behind cracked glass, a single dark-red rose at her temple. The thing she held is gone; she is what its absence left in place." },
    { family:"mourning", img:"./images/mourning-02.webp",
      texts:[
        "Grief is not the weight. Grief is the space the weight used to fill.",
        "It is not heavy. It is hollow, exactly the size of what is missing.",
        "You keep bracing for the load. The ache is that there is none."
      ],
      desc:"A dark figure in profile, a deep crimson rose blooming where she once leaned. The grief here is not the rose — it is the emptiness shaped around it." },
    { family:"mourning", img:"./images/mourning-03.webp",
      texts:[
        "You keep reaching for the shape of it. The reaching is the last place it lives.",
        "Your hand still goes to where it was. That reflex is the final room it has.",
        "It survives now only in the motion of looking for it."
      ],
      desc:"A silhouette behind shattering glass, two red roses caught in the break. The reaching toward what is gone is the only place it still exists." },
    { family:"mourning", img:"./images/mourning-04.webp",
      texts:[
        "Nothing is wrong with you. Something is missing from you. Those are not the same.",
        "You are not broken. You are incomplete in a specific, nameable way.",
        "It is not a flaw. It is an absence, and absences ache differently."
      ],
      desc:"A woman in a black gown before a full moon, a red rose hanging from her hand, the air webbed with fine cracks. Nothing is broken in her — something is simply gone." },
    { family:"mourning", img:"./images/mourning-05.webp",
      texts:[
        "You did not fail to hold on. It was never yours to keep.",
        "You held perfectly. It was still always going to leave.",
        "There was no grip that would have changed this. Stop auditing your hands."
      ],
      desc:"A profile turned upward, a red rose in dark hair, bare branches and tears tracing the cheek. The loss was never a question of holding tighter." },
    { family:"mourning", img:"./images/mourning-06.webp",
      texts:[
        "The ache is not a wound to close. It is the measure of what was real.",
        "If it did not hurt, it would not have counted. The ache is the proof.",
        "Do not rush to heal it. It is keeping the record of something true."
      ],
      desc:"A face leaning close to a glowing yellow rose, the world behind her veined with cracks. The tenderness and the fracture are the same gesture — the ache measures the love." },
    { family:"mourning", img:"./images/mourning-07.webp",
      texts:[
        "You are allowed to set it down without it meaning you have let it go.",
        "Putting it down for a while is not abandonment. Rest your arms.",
        "You can stop carrying it and still keep it. Those were never the same act."
      ],
      desc:"A darkened profile beside a single luminous yellow rose, fine fractures spreading through the dark. To stop holding it is not to lose it." },
    { family:"mourning", img:"./images/mourning-08.webp",
      texts:[
        "What you lost left a shape behind. You are learning to live in a house with that room.",
        "There is a room now you do not enter and cannot wall off. You live alongside it.",
        "The absence has architecture. You are learning its doorways."
      ],
      desc:"A cracked dark face turned toward a vivid bloom of colour. What is gone has left a room in her — and she is slowly learning to live in the house that holds it." },
    { family:"mourning", img:"./images/mourning-09.webp",
      texts:[
        "It does not get lighter. You get wider around it.",
        "The weight stays. You grow the frame that can carry it.",
        "Nothing about it shrinks. You are the thing that enlarges."
      ],
      desc:"A woman cradled among deep crimson roses behind fractured glass. The grief is not smaller here — she has simply grown wide enough to hold it." },
    { family:"mourning", img:"./images/mourning-10.webp",
      texts:[
        "You will carry it differently in a year. Not less. Differently.",
        "Time will not lighten the load. It will change your grip.",
        "A year from now it weighs the same and sits in a new place."
      ],
      desc:"A serene profile adorned in black lace leaves and a single dark jewel, eyes closed. Carried with a kind of grace now — the same weight, held in a changed way." },

    // WITHERED
    { family:"withered", img:"./images/withered-anchor.webp",
      texts:[
        "Nothing took it from you. It left a little at a time, and you were too tired to notice the leaving.",

    { family:"withered", img:"./images/withered-01.webp",

      desc:"A profile of skin gone to cracked, parched earth, faint embers glowing in the fissures. Not idle — scorched dry, and needing water, not effort." },
    { family:"withered", img:"./images/withered-08.webp",
      texts:[

      desc:"A profile crusted in charred, peeling bark, a low ember-light beneath, against cold teal. It withered for lack of water — and the question of whose job that was remains." },
    { family:"withered", img:"./images/withered-09.webp",
      texts:[

    { family:"withered", img:"./images/withered-10.webp",
      texts:[

      desc:"A calm face dissolving into a grid of faded, sepia-toned fragments. She is running dry — and the rest she keeps postponing is the very water she needs." },

    // FRACTURED
    { family:"fractured", img:"./images/fractured-anchor.webp",
      texts:[
        "The break did not weaken you. It showed you the line the weight was always travelling.",

        "Now you can see the path the pressure took. That is not damage. That is information."
      ],
      desc:"A woman in profile half-built of red and black tiles, shattering into flying shards. The break is not ruin here — it reveals the line the weight always ran." },

      texts:[
        "The crack is where the load was always going to find you. Now you know where you're strong.",

      texts:[
        "Something had to give. Be glad it was the thing and not you.",

      texts:[

      ],
      desc:"A profile with a quiet head erupting into a bloom of warm amber and gold. Not an ending — the structure breaking open into honest, living colour." },

      texts:[
        "You can be broken and load-bearing at once. You are proof.",

      desc:"A profile crowned with an explosion of colour bursting outward in every direction. Broken open and still standing, still holding — vivid proof that both are possible." },

      texts:[
        "The line that broke is the line you'll reinforce. That is how it becomes strong.",

      desc:"A profile scattering into orange and teal sparks, threads of colour dripping down. The fault becomes the focus — the broken line is where the strength will be rebuilt." },
    { family:"fractured", img:"./images/fractured-09.webp",
      texts:[
        "Do not fill the crack to hide it. Fill it to honour where it held until it couldn't.",

        "Fill the fracture as a record, not a cover-up. It held a long time first."
      ],
      desc:"A dark profile against cream, the mind scattering into bright splattered colour. The crack is not to be concealed — it is to be honoured for how long it held." },
    { family:"fractured", img:"./images/fractured-10.webp",
      texts:[
        "What fractured did not fail. It held far past the point it should have, and then it spoke.",

        "It outlasted everything it should have. The break was the first time it asked for relief."

      desc:"A profile dissolving upward into a riot of colour, every hue at once. What broke here did not fail — it held long past its limit, and the fracture is its first word." }
  ];

  // Build-time invariant: exactly 55 cards.
  console.assert(CARDS.length === 55, "Expected 55 cards, found " + CARDS.length);

  // Per-family glow tint (each family's accent, from the art spec), as RGB triplets.
  const GLOW = {
    contained: "108, 129, 140",
    torn:      "156, 122, 110",
    mourning:  "125, 118, 137",
    withered:  "131, 124, 108",
    fractured: "181, 127, 58"
  };

  const STORE_KEY = "qfo:lastIndex";

  const card = document.getElementById("card");
  const inner = document.getElementById("inner");
  const front = document.getElementById("front");
  const back = document.getElementById("back");
  const art = document.getElementById("art");
  const label = document.getElementById("label");
  const fragment = document.getElementById("fragment");
  const desc = document.getElementById("desc");
  const drawBtn = document.getElementById("draw");

  // A missing back image degrades to the plain dark back face — the flip still works.
  back.addEventListener("error", () => { back.style.visibility = "hidden"; });

  function setGlow(rgb) {
    card.style.setProperty("--glow", "rgba(" + rgb + ", 0.55)");
  }

  // Derive the glow colour from the card art itself, biased toward its vivid tones,
  // so the halo always matches the image it sits with. Same-origin → no canvas taint.
  const swatch = document.createElement("canvas");
  swatch.width = swatch.height = 28;
  const sctx = swatch.getContext("2d", { willReadFrequently: true });

  function glowFromImage(img) {
    try {
      sctx.clearRect(0, 0, 28, 28);
      sctx.drawImage(img, 0, 0, 28, 28);
      const data = sctx.getImageData(0, 0, 28, 28).data;
      let r = 0, g = 0, b = 0, w = 0;
      for (let i = 0; i < data.length; i += 4) {
        const R = data[i], G = data[i + 1], B = data[i + 2], A = data[i + 3];
        if (A < 128) continue;
        const mx = Math.max(R, G, B), mn = Math.min(R, G, B);
        const sat = mx === 0 ? 0 : (mx - mn) / mx;
        const weight = 0.18 + sat;            // let saturated regions lead the glow
        r += R * weight; g += G * weight; b += B * weight; w += weight;
      }
      if (w === 0) return null;
      r /= w; g /= w; b /= w;
      const peak = Math.max(r, g, b);         // lift dark averages so the glow still reads
      if (peak > 0 && peak < 150) {
        const s = Math.min(150 / peak, 2.1);
        r *= s; g *= s; b *= s;
      }
      return Math.round(r) + ", " + Math.round(g) + ", " + Math.round(b);
    } catch (e) {
      return null;
    }
  }

  // The back face glows in its own colour, sampled from the back art.
  function applyBackGlow() {
    const rgb = glowFromImage(back);
    card.style.setProperty("--glow-back", "rgba(" + (rgb || "150, 45, 48") + ", 0.55)");
  }
  back.addEventListener("load", applyBackGlow);
  if (back.complete && back.naturalWidth) applyBackGlow();

  // Put a card's content onto the front face (and tune the glow to it).
  function applyCardContent(c) {
    const fam = FAMILIES[c.family];
    front.style.background = fam.base;
    setGlow(GLOW[c.family]); // instant family-accent glow; refined from the image on load
    label.textContent = fam.label;
    fragment.textContent = c.texts[Math.floor(Math.random() * c.texts.length)];
    desc.textContent = c.desc;

    art.onload = () => {
      art.style.visibility = "visible";
      const rgb = glowFromImage(art);
      if (rgb) setGlow(rgb);
    };
    art.onerror = () => { art.style.visibility = "hidden"; }; // base colour + text remain
    art.src = c.img;
    if (art.complete && art.naturalWidth) art.onload();
  }

  const FLIP_MS = 1150;
  const prefersReduced = () =>
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let swapTimer = null;
  let introTimer = null;

  function render(index, animate) {
    const c = CARDS[index];

    // A draw cancels any opening intro that is still pending or running.
    clearTimeout(introTimer);
    card.classList.remove("is-back", "is-intro");

    // Immediate path: open / restore / reduced-motion — show the card face-up, no flip.
    if (!animate || prefersReduced()) {
      clearTimeout(swapTimer);
      card.classList.remove("is-flipping", "is-reading");
      applyCardContent(c);
      card.classList.add("is-settled");
      return;
    }

    // Flip path: turn the card fully over (past its back) and land on the new face.
    card.classList.remove("is-settled", "is-reading");
    card.classList.remove("is-flipping");
    void inner.offsetWidth;            // restart the flip animation on rapid draws
    card.classList.add("is-flipping");

    // Swap the front to the new card at the midpoint, while it faces away.
    clearTimeout(swapTimer);
    swapTimer = setTimeout(() => applyCardContent(c), FLIP_MS / 2);
  }

  function draw() {
    const index = Math.floor(Math.random() * CARDS.length);
    try { localStorage.setItem(STORE_KEY, String(index)); } catch (e) {}
    render(index, true);
  }

  let pendingReveal = false;

  // Rest the card face-down with a card armed behind it, waiting for the first tap.
  function armBack(index) {
    applyCardContent(CARDS[index]); // front prepared behind the back
    try { localStorage.setItem(STORE_KEY, String(index)); } catch (e) {}

    if (prefersReduced()) {
      card.classList.add("is-settled");
      pendingReveal = false;
      return;
    }
    card.classList.remove("is-flipping", "is-intro", "is-reading", "is-settled");
    card.classList.add("is-back");
    pendingReveal = true;
  }

  // First tap: turn the armed card up — a half flip from its resting back.
  function revealArmed() {
    pendingReveal = false;
    if (prefersReduced()) {
      card.classList.remove("is-back");
      card.classList.add("is-settled");
      return;
    }
    card.classList.remove("is-intro");
    void inner.offsetWidth;
    card.classList.add("is-intro"); // animate 180 -> 360 from the resting back
  }

  function onTap() {
    if (pendingReveal) revealArmed();
    else draw();
  }

  // When a flip lands, hold the front and phase the fragment text in.
  inner.addEventListener("animationend", (e) => {
    if (e.animationName === "flip" || e.animationName === "flip-in") {
      card.classList.remove("is-flipping", "is-intro", "is-back");
      card.classList.add("is-reading");
    }
  });

  card.addEventListener("click", onTap);
  drawBtn.addEventListener("click", onTap);

  // On open: rest on the back with a fresh random card armed behind it.
  (function init() {
    armBack(Math.floor(Math.random() * CARDS.length));
  })();

  // PWA: register the service worker with a relative scope.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(() => {});
    });
  }
</script>
